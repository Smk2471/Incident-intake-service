spring:
  application:
    name: incident-intake-service
  datasource:
    url: jdbc:h2:mem:incidents;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: ${PORT:8080}
  forward-headers-strategy: framework

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [correlationId=%X{correlationId}] %logger{36} - %msg%n"
  level:
    root: INFO
    com.example.incident: INFO
